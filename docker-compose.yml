# Local production-like stack (v2.0)
services:
  zooplus-api:
    build: .
    ports:
      - "8080:8080"
    environment:
      ZOOPLUS_LOG_LEVEL: INFO
      ZOOPLUS_RETRIEVAL_MODE: hybrid
      ZOOPLUS_VECTOR_BACKEND: chroma_local
    volumes:
      - chroma-data:/app/artifacts/index/chroma
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8080/ready')"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 90s

volumes:
  chroma-data:
