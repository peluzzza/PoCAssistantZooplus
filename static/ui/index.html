<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>zooplus Assistant — PoC Chat</title>
    <base href="/ui/" />
    <link rel="stylesheet" href="/ui/styles.css" />
  </head>
  <body>
    <div class="app">
      <header class="header">
        <div>
          <h1>zooplus Assistant</h1>
          <p class="subtitle">Local PoC — RAG over your shop catalog</p>
        </div>
        <div class="controls">
          <label>
            Shop
            <select id="siteId" aria-label="Shop"></select>
          </label>
          <label title="PoC debug — overrides all agents for one request">
            Override
            <select id="modelSelect" aria-label="OpenCode model override">
              <option value="">Per-agent (default)</option>
            </select>
          </label>
          <span id="modeBadge" class="badge">…</span>
        </div>
      </header>
      <details id="agentModelsPanel" class="agent-models">
        <summary>Agent LLMs (OpenCode per-agent config)</summary>
        <ul id="agentModelsList"></ul>
      </details>

      <main id="messages" class="messages" aria-live="polite"></main>

      <form id="chatForm" class="composer">
        <textarea
          id="queryInput"
          rows="2"
          placeholder="Ask about pet food, treats, toys… (Enter to send)"
          required
        ></textarea>
        <button type="submit" id="sendBtn">Send</button>
      </form>
    </div>
    <script src="/ui/app.js" defer></script>
  </body>
</html>
