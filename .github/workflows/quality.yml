name: Quality gates

on:
  push:
    branches: [main, dev, "feature/**"]
  pull_request:
    branches: [dev, main]

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Verify Python version
        run: python -c "import sys; assert sys.version_info[:2]==(3,11), sys.version"

      - name: Install dependencies
        run: pip install -e ".[rag,dev]"

      - name: Ruff lint
        run: ruff check cli src tests

      - name: Ruff format check
        run: ruff format --check cli src tests

      - name: Prepare reports directory
        run: mkdir -p reports

      - name: Unit tests
        run: pytest tests/unit -q --junitxml=reports/junit-unit.xml

      - name: Integration tests
        run: pytest tests/integration -q --junitxml=reports/junit-integration.xml

      - name: E2E smoke tests
        run: pytest tests/e2e -q --junitxml=reports/junit-e2e.xml

      - name: Coverage (XML for Sonar)
        run: pytest tests/ -q --cov=cli --cov=src --cov-report=xml:coverage.xml --junitxml=reports/junit.xml

  sonar:
    needs: quality
    runs-on: ubuntu-latest
    if: ${{ github.repository == 'peluzzza/PoCAssistantZooplus' }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: SonarCloud Scan
        uses: SonarSource/sonarqube-scan-action@v4
        continue-on-error: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
